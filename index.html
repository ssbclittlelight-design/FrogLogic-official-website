<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrogLogic | Premium Hub</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700;900&display=swap');
        
        body { 
            font-family: 'Outfit', sans-serif; 
            background-color: #050505; 
            color: #ffffff; 
            /* Subtle radial glowing background */
            background-image: radial-gradient(circle at 50% 0%, rgba(34, 197, 94, 0.15) 0%, #050505 50%);
            background-attachment: fixed;
            touch-action: manipulation; 
            -webkit-tap-highlight-color: transparent;
        }

        /* Glassmorphism Utilities */
        .glass {
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .glass-active {
            background: rgba(34, 197, 94, 0.15);
            border: 1px solid rgba(34, 197, 94, 0.4);
            box-shadow: 0 0 20px rgba(34, 197, 94, 0.2);
        }

        /* Game Grid Styles */
        .frog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        .game-cell { 
            aspect-ratio: 1/1; 
            display: flex; align-items: center; justify-content: center; 
            font-size: 3rem; border-radius: 16px; cursor: pointer; transition: all 0.2s;
            background: rgba(255,255,255,0.02);
            border: 1px solid rgba(255,255,255,0.05);
        }
        .game-cell:active { transform: scale(0.92); }
        .game-cell.active-frog { background: rgba(34, 197, 94, 0.1); border-color: rgba(34, 197, 94, 0.5); }
        
        .frog-emoji { animation: bounce-in 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; }
        @keyframes bounce-in { 0% { transform: scale(0); } 80% { transform: scale(1.2); } 100% { transform: scale(1); } }
        
        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050505; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 10px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen flex flex-col relative pb-10">
                    {/* Floating Navigation Bar */}
                    <div className="fixed top-6 left-1/2 -translate-x-1/2 w-[90%] max-w-md z-50">
                        <nav className="glass rounded-full px-2 py-2 flex justify-between items-center shadow-2xl">
                            <div className="flex items-center pl-3 gap-2 font-black text-lg tracking-wider text-white">
                                <span className="drop-shadow-[0_0_8px_rgba(34,197,94,0.8)]">🐸</span> FROGLOGIC
                            </div>
                            <div className="flex gap-1">
                                <NavButton label="Home" active={tab === 'home'} onClick={() => setTab('home')} />
                                <NavButton label="Games" active={tab === 'games'} onClick={() => setTab('games')} />
                                <NavButton label="Gallery" active={tab === 'gallery'} onClick={() => setTab('gallery')} />
                            </div>
                        </nav>
                    </div>

                    {/* Main Content Area */}
                    <main className="flex-grow w-full max-w-5xl mx-auto pt-32 px-4 sm:px-6">
                        {tab === 'home' && <Home />}
                        {tab === 'games' && <Games />}
                        {tab === 'gallery' && <Gallery />}
                    </main>
                </div>
            );
        }

        function NavButton({ label, active, onClick }) {
            return (
                <button 
                    onClick={onClick} 
                    className={`px-4 py-2 rounded-full text-sm font-bold transition-all duration-300 ${active ? 'bg-green-500 text-black shadow-[0_0_15px_rgba(34,197,94,0.4)]' : 'text-gray-400 hover:text-white hover:bg-white/5'}`}
                >
                    {label}
                </button>
            );
        }

        function Home() {
            return (
                <div className="flex flex-col items-center justify-center pt-8 sm:pt-16 animate-in fade-in slide-in-from-bottom-8 duration-700">
                    <div className="relative mb-8 group">
                        <div className="absolute inset-0 bg-green-500 rounded-full blur-2xl opacity-20 group-hover:opacity-40 transition-opacity duration-500"></div>
                        <div className="relative glass p-6 sm:p-8 rounded-full border-green-500/30">
                            <span className="text-7xl sm:text-8xl filter drop-shadow-lg">🐸</span>
                        </div>
                    </div>
                    
                    <h1 className="text-5xl sm:text-7xl font-black mb-4 tracking-tighter text-transparent bg-clip-text bg-gradient-to-b from-white to-gray-500 text-center">
                        THE <span className="text-transparent bg-clip-text bg-gradient-to-r from-green-400 to-emerald-600">LOGICAL</span> CHOICE
                    </h1>
                    
                    <p className="text-gray-400 text-lg sm:text-xl mb-12 max-w-lg mx-auto text-center font-light">
                        Welcome to the official hub. Master the games, learn the lore, and join the best community in gaming.
                    </p>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4 w-full max-w-md">
                        <a href="https://youtube.com/@froglogicyt?si=pd_StrNtVRto6Jsm" target="_blank" className="relative group overflow-hidden rounded-2xl p-[1px]">
                            <span className="absolute inset-0 bg-gradient-to-r from-red-500 to-orange-600 rounded-2xl opacity-70 group-hover:opacity-100 transition-opacity"></span>
                            <div className="relative bg-black/80 backdrop-blur-sm px-6 py-4 rounded-2xl flex items-center justify-center gap-3 transition-transform group-hover:scale-[0.98]">
                                <span className="text-xl">📺</span>
                                <span className="font-bold text-white tracking-wide">YouTube</span>
                            </div>
                        </a>
                        
                        <a href="https://discord.gg/jYyyTj6Ak" target="_blank" className="relative group overflow-hidden rounded-2xl p-[1px]">
                            <span className="absolute inset-0 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-2xl opacity-70 group-hover:opacity-100 transition-opacity"></span>
                            <div className="relative bg-black/80 backdrop-blur-sm px-6 py-4 rounded-2xl flex items-center justify-center gap-3 transition-transform group-hover:scale-[0.98]">
                                <span className="text-xl">💬</span>
                                <span className="font-bold text-white tracking-wide">Discord</span>
                            </div>
                        </a>
                    </div>
                </div>
            );
        }

        function Games() {
            const [gameType, setGameType] = useState('catch');

            return (
                <div className="animate-in zoom-in-95 duration-500">
                    <div className="flex justify-center gap-3 mb-8 bg-black/40 p-1.5 rounded-full max-w-xs mx-auto border border-white/5">
                        <button onClick={() => setGameType('catch')} className={`flex-1 py-2.5 rounded-full font-bold text-sm transition-all ${gameType === 'catch' ? 'bg-green-500 text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>60s Catch</button>
                        <button onClick={() => setGameType('tictactoe')} className={`flex-1 py-2.5 rounded-full font-bold text-sm transition-all ${gameType === 'tictactoe' ? 'bg-green-500 text-black shadow-lg' : 'text-gray-400 hover:text-white'}`}>Tic-Tac-Toe</button>
                    </div>
                    
                    <div className="glass rounded-[2rem] p-6 sm:p-10 max-w-md mx-auto min-h-[500px] flex flex-col justify-center shadow-2xl relative overflow-hidden">
                        {/* Decorative background glow */}
                        <div className="absolute -top-20 -right-20 w-40 h-40 bg-green-500/10 blur-3xl rounded-full pointer-events-none"></div>
                        
                        {gameType === 'catch' ? <CatchFrog /> : <TicTacToe />}
                    </div>
                </div>
            );
        }

        function CatchFrog() {
            const [score, setScore] = useState(0);
            const [pos, setPos] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [gameState, setGameState] = useState('idle'); 
            const timerRef = useRef(null);

            const startGame = () => {
                setScore(0); setTimeLeft(60); setGameState('playing');
                setPos(Math.floor(Math.random() * 9));
                if (timerRef.current) clearInterval(timerRef.current);
                timerRef.current = setInterval(() => {
                    setTimeLeft(p => {
                        if (p <= 1) { clearInterval(timerRef.current); setGameState('finished'); setPos(null); return 0; }
                        return p - 1;
                    });
                }, 1000);
            };

            useEffect(() => () => { if (timerRef.current) clearInterval(timerRef.current); }, []);

            const handleTap = (i) => {
                if (gameState === 'playing' && i === pos) {
                    setScore(s => s + 1);
                    setPos(Math.floor(Math.random() * 9));
                }
            };

            if (gameState === 'idle') {
                return (
                    <div className="text-center z-10">
                        <div className="text-6xl mb-4">🎯</div>
                        <h2 className="text-3xl font-black text-white mb-3">Reflex Test</h2>
                        <p className="text-gray-400 mb-8 px-4 text-sm">How many logical frogs can you catch in 60 seconds?</p>
                        <button onClick={startGame} className="bg-gradient-to-r from-green-400 to-emerald-600 text-black font-black text-lg px-10 py-4 rounded-full shadow-[0_0_20px_rgba(34,197,94,0.3)] hover:scale-105 active:scale-95 transition-all">
                            BEGIN CHALLENGE
                        </button>
                    </div>
                );
            }

            if (gameState === 'finished') {
                return (
                    <div className="text-center z-10">
                        <h2 className="text-2xl font-bold text-gray-400 mb-2 uppercase tracking-widest">Time's Up</h2>
                        <div className="text-8xl font-black text-transparent bg-clip-text bg-gradient-to-b from-white to-green-500 mb-8 drop-shadow-2xl">
                            {score}
                        </div>
                        <button onClick={startGame} className="glass px-8 py-3 rounded-full font-bold text-white hover:bg-white/10 transition-all border-white/20">
                            TRY AGAIN
                        </button>
                    </div>
                );
            }

            return (
                <div className="flex flex-col h-full justify-between z-10">
                    <div className="flex justify-between items-center mb-8 px-4 glass rounded-2xl py-3 border-white/10">
                        <div className="text-center flex-1">
                            <p className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1">Seconds</p>
                            <p className={`text-3xl font-black tabular-nums ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{timeLeft}</p>
                        </div>
                        <div className="w-px h-10 bg-white/10"></div>
                        <div className="text-center flex-1">
                            <p className="text-[10px] text-gray-400 uppercase font-bold tracking-widest mb-1">Caught</p>
                            <p className="text-3xl font-black text-green-400 tabular-nums">{score}</p>
                        </div>
                    </div>
                    <div className="frog-grid">
                        {[...Array(9)].map((_, i) => (
                            <div key={i} onClick={() => handleTap(i)} className={`game-cell hover:bg-white/5 ${i === pos ? 'active-frog' : ''}`}>
                                {i === pos && <span className="frog-emoji filter drop-shadow-[0_0_10px_rgba(34,197,94,0.8)]">🐸</span>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function TicTacToe() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xNext, setXNext] = useState(true);

            const winner = ((sq) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of lines) if (sq[a] && sq[a] === sq[b] && sq[a] === sq[c]) return sq[a];
                return null;
            })(board);
            const isDraw = !winner && board.every(v => v !== null);

            const handleClick = (i) => {
                if (winner || board[i]) return;
                const next = board.slice();
                next[i] = xNext ? 'X' : 'O';
                setBoard(next);
                setXNext(!xNext);
            };

            return (
                <div className="text-center z-10">
                    <div className="glass inline-block px-6 py-2 rounded-full mb-8 border-white/10">
                        <p className="font-bold text-sm tracking-widest uppercase">
                            {winner ? (
                                <span className="text-green-400">Player {winner} Wins!</span>
                            ) : isDraw ? (
                                <span className="text-yellow-400">Stalemate</span>
                            ) : (
                                <span className="text-white">Turn: <span className={xNext ? 'text-blue-400' : 'text-pink-400'}>{xNext ? 'X' : 'O'}</span></span>
                            )}
                        </p>
                    </div>
                    <div className="frog-grid">
                        {board.map((v, i) => (
                            <div key={i} onClick={() => handleClick(i)} className="game-cell hover:bg-white/5 font-black">
                                <span className={v === 'X' ? 'text-blue-400 drop-shadow-[0_0_8px_rgba(96,165,250,0.5)]' : 'text-pink-400 drop-shadow-[0_0_8px_rgba(244,114,182,0.5)]'}>
                                    {v}
                                </span>
                            </div>
                        ))}
                    </div>
                    <button onClick={() => { setBoard(Array(9).fill(null)); setXNext(true); }} className="mt-8 text-xs text-gray-400 font-bold uppercase tracking-widest hover:text-white transition-colors">
                        Clear Board
                    </button>
                </div>
            );
        }

        function Gallery() {
            const photos = [
                { id: 1, src: 'IMG_1481.webp', title: 'Official Adoption Certificate' },
                { id: 2, src: 'photo2.jpg', title: 'Community Screenshot' },
                { id: 3, src: 'photo3.jpg', title: 'Fan Art Archive' }
            ];

            return (
                <div className="animate-in fade-in slide-in-from-bottom-8 duration-500 max-w-3xl mx-auto">
                    <div className="text-center mb-10">
                        <h2 className="text-4xl font-black mb-2 text-transparent bg-clip-text bg-gradient-to-r from-white to-gray-500">THE VAULT</h2>
                        <p className="text-green-400 text-sm font-bold tracking-widest uppercase">Lore & Archives</p>
                    </div>
                    
                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                        {photos.map(photo => (
                            <div key={photo.id} className="glass rounded-3xl p-3 flex flex-col gap-3 group hover:border-green-500/30 transition-colors">
                                <div className="aspect-[4/3] rounded-2xl overflow-hidden bg-black/50 relative">
                                    <img 
                                        src={photo.src} 
                                        alt={photo.title}
                                        className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110"
                                        onError={(e) => {
                                            e.target.style.display = 'none';
                                            e.target.parentNode.innerHTML = `
                                                <div class="absolute inset-0 flex flex-col items-center justify-center p-6 text-center">
                                                    <span class="text-2xl mb-2 opacity-50">📁</span>
                                                    <span class="text-xs font-bold text-gray-500 uppercase tracking-widest">Awaiting File</span>
                                                    <span class="text-[10px] text-gray-600 mt-1">${photo.src}</span>
                                                </div>
                                            `;
                                        }}
                                    />
                                </div>
                                <div className="px-2 pb-2 text-center">
                                    <p className="text-sm font-bold text-white tracking-wide">{photo.title}</p>
                                </div>
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
