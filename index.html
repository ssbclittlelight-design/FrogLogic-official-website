<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrogLogic | Official Fan Site</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        
        /* Certificate Styling */
        .cert-paper {
            background: #fff;
            color: #1a1a1a;
            padding: 40px;
            border: 15px double #d4af37;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            max-width: 600px;
            margin: 0 auto;
            position: relative;
        }
        .cert-title { font-family: 'Playfair Display', serif; text-transform: uppercase; letter-spacing: 4px; }
        .cert-script { font-family: 'Dancing Script', cursive; font-size: 2.2rem; color: #222; border-bottom: 2px solid #333; display: inline-block; min-width: 250px; padding: 0 10px; }
        
        /* Game Styling */
        .frog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #1f2937; border-radius: 12px; cursor: pointer; font-size: 2.5rem; transition: all 0.1s; }
        .game-cell:active { transform: scale(0.95); background: #374151; }
        .frog-emoji { animation: pop-in 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; user-select: none; }
        @keyframes pop-in { from { transform: scale(0); } to { transform: scale(1); } }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen flex flex-col">
                    <nav className="bg-gray-800 p-4 border-b border-green-500/20 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 font-black text-xl text-green-500 tracking-tighter cursor-pointer" onClick={() => setTab('home')}>
                                <span>🐸</span> FROGLOGIC
                            </div>
                            <div className="flex gap-1 sm:gap-2">
                                <NavBtn label="Home" active={tab === 'home'} onClick={() => setTab('home')} />
                                <NavBtn label="Games" active={tab === 'games'} onClick={() => setTab('games')} />
                                <NavBtn label="Lore" active={tab === 'lore'} onClick={() => setTab('lore')} />
                            </div>
                        </div>
                    </nav>

                    <main className="flex-grow max-w-4xl mx-auto w-full p-4 sm:p-6">
                        {tab === 'home' && <Home />}
                        {tab === 'games' && <Games />}
                        {tab === 'lore' && <Lore />}
                    </main>

                    <footer className="p-8 text-center text-gray-600 text-xs border-t border-gray-800">
                        <p>© {new Date().getFullYear()} FrogLogic Fan Page</p>
                    </footer>
                </div>
            );
        }

        function NavBtn({ label, active, onClick }) {
            return (
                <button onClick={onClick} className={`px-3 py-1.5 rounded-full text-xs sm:text-sm font-bold transition ${active ? 'bg-green-500 text-gray-900' : 'text-gray-400 hover:text-white'}`}>
                    {label}
                </button>
            );
        }

        function Home() {
            return (
                <div className="py-8 animate-in fade-in duration-700">
                    <div className="text-center mb-10">
                        <div className="inline-block mb-6 p-4 bg-gray-800 rounded-3xl border-2 border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.2)]">
                            <span className="text-7xl">🐸</span>
                        </div>
                        <h1 className="text-5xl font-black mb-4 tracking-tight bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">FrogLogic</h1>
                        <p className="text-gray-400 text-lg max-w-md mx-auto">Stay Logical. Stay Froggy. Your central hub for all things FrogLogic.</p>
                    </div>
                    <div className="grid gap-4 max-w-sm mx-auto">
                        <a href="https://youtube.com/@froglogicyt?si=pd_StrNtVRto6Jsm" target="_blank" className="bg-red-600 text-center p-4 rounded-2xl font-black text-lg hover:scale-105 transition-all shadow-lg">📺 YouTube</a>
                        <a href="https://discord.gg/jYyyTj6Ak" target="_blank" className="bg-indigo-600 text-center p-4 rounded-2xl font-black text-lg hover:scale-105 transition-all shadow-lg">💬 Discord</a>
                    </div>
                </div>
            );
        }

        function Lore() {
            return (
                <div className="py-8 animate-in zoom-in duration-500">
                    <h2 className="text-3xl font-black text-center mb-8">Channel Lore</h2>
                    <div className="cert-paper text-center">
                        <p className="text-xs font-bold text-gray-400 mb-1">CERTIFICATE OF</p>
                        <h3 className="cert-title text-4xl font-bold mb-8">ADOPTION</h3>
                        
                        <p className="mb-2 italic text-gray-600">This certifies that</p>
                        <span className="cert-script">FrogLogic</span>
                        
                        <p className="mt-4 mb-2 italic text-gray-600">has officially adopted</p>
                        <span className="cert-script text-3xl">"Derpy Vandals"</span>
                        
                        <p className="mt-10 px-4 text-xs leading-relaxed text-gray-700">
                            By signing this certificate, I promise to give them the lifetime of 
                            love, care, and attention that they deserve. I promise to do my 
                            best to protect them and help them live a happy and healthy life.
                        </p>
                        
                        <div className="mt-12 flex justify-between px-4">
                            <div className="text-left">
                                <span className="cert-script text-xl min-w-0 border-none">FrogLogic</span>
                                <div className="border-t border-gray-400 text-[10px] uppercase font-bold text-gray-400 mt-1">Signature</div>
                            </div>
                            <div className="text-right">
                                <span className="font-bold text-gray-800">May 2nd, 2007</span>
                                <div className="border-t border-gray-400 text-[10px] uppercase font-bold text-gray-400 mt-1">Date</div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function Games() {
            const [gameType, setGameType] = useState('catch');
            return (
                <div className="py-6">
                    <div className="flex justify-center gap-4 mb-8">
                        <button onClick={() => setGameType('catch')} className={`px-4 py-2 rounded-xl font-bold ${gameType === 'catch' ? 'bg-gray-700 text-green-400 border border-green-500/50' : 'bg-gray-800 text-gray-500'}`}>Catch Frog</button>
                        <button onClick={() => setGameType('tictactoe')} className={`px-4 py-2 rounded-xl font-bold ${gameType === 'tictactoe' ? 'bg-gray-700 text-green-400 border border-green-500/50' : 'bg-gray-800 text-gray-500'}`}>Tic Tac Toe</button>
                    </div>
                    <div className="bg-gray-800/50 p-6 rounded-3xl border border-gray-700 max-w-md mx-auto min-h-[450px]">
                        {gameType === 'catch' ? <CatchFrog /> : <TicTacToe />}
                    </div>
                </div>
            );
        }

        function CatchFrog() {
            const [score, setScore] = useState(0);
            const [pos, setPos] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [gameState, setGameState] = useState('idle');
            const timerRef = useRef(null);

            const startGame = () => {
                setScore(0); setTimeLeft(60); setGameState('playing');
                setPos(Math.floor(Math.random() * 9));
                timerRef.current = setInterval(() => {
                    setTimeLeft(p => {
                        if (p <= 1) { clearInterval(timerRef.current); setGameState('finished'); return 0; }
                        return p - 1;
                    });
                }, 1000);
            };

            return (
                <div className="text-center h-full flex flex-col justify-center">
                    {gameState === 'idle' ? (
                        <div>
                            <h3 className="text-2xl font-black mb-6">Can you catch 'em?</h3>
                            <button onClick={startGame} className="bg-green-500 text-gray-900 font-black px-8 py-4 rounded-2xl">START 60s BLITZ</button>
                        </div>
                    ) : gameState === 'finished' ? (
                        <div>
                            <p className="text-green-500 font-black">GAME OVER</p>
                            <h3 className="text-6xl font-black mb-8">{score}</h3>
                            <button onClick={startGame} className="bg-gray-700 px-6 py-2 rounded-xl">Play Again</button>
                        </div>
                    ) : (
                        <div>
                            <div className="flex justify-between mb-4 font-black">
                                <span className={timeLeft < 10 ? 'text-red-500' : ''}>{timeLeft}s</span>
                                <span className="text-green-500">Score: {score}</span>
                            </div>
                            <div className="frog-grid">
                                {[...Array(9)].map((_, i) => (
                                    <div key={i} onClick={() => i === pos && (setScore(s=>s+1), setPos(Math.floor(Math.random()*9)))} className="game-cell">
                                        {i === pos && <span className="frog-emoji">🐸</span>}
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function TicTacToe() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xNext, setXNext] = useState(true);
            const winner = ((s) => {
                const l = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of l) if (s[a] && s[a] === s[b] && s[a] === s[c]) return s[a];
                return null;
            })(board);

            return (
                <div className="text-center">
                    <p className="font-bold mb-4">{winner ? `Winner: ${winner}` : `Next: ${xNext ? '❌' : '⭕'}`}</p>
                    <div className="frog-grid">
                        {board.map((v, i) => (
                            <div key={i} onClick={() => !winner && !board[i] && (setBoard(b => {const n=[...b]; n[i]=xNext?'❌':'⭕'; return n;}), setXNext(!xNext))} className="game-cell bg-gray-900 text-xl font-bold">
                                {v}
                            </div>
                        ))}
                    </div>
                    <button onClick={() => setBoard(Array(9).fill(null))} className="mt-6 text-xs text-green-500 font-bold uppercase border-b border-green-500">Reset</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
