<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FrogLogic | Official Fan Site</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React and Babel to run code in browser -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { font-family: 'Inter', sans-serif; touch-action: manipulation; }
        .frog-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; }
        .game-cell { aspect-ratio: 1/1; display: flex; align-items: center; justify-content: center; background: #1f2937; border-radius: 12px; cursor: pointer; font-size: 2.5rem; transition: all 0.1s; position: relative; overflow: hidden; }
        .game-cell:active { transform: scale(0.95); background: #374151; }
        .frog-emoji { animation: pop-in 0.1s cubic-bezier(0.175, 0.885, 0.32, 1.275); pointer-events: none; user-select: none; }
        @keyframes pop-in { from { transform: scale(0); } to { transform: scale(1); } }
        /* Custom scrollbar for a gamer look */
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #111827; }
        ::-webkit-scrollbar-thumb { background: #22c55e; border-radius: 4px; }
    </style>
</head>
<body class="bg-gray-900 text-gray-100">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        function App() {
            const [tab, setTab] = useState('home');

            return (
                <div className="min-h-screen flex flex-col">
                    {/* Navigation */}
                    <nav className="bg-gray-800 p-4 border-b border-green-500/20 sticky top-0 z-50">
                        <div className="max-w-4xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2 font-black text-xl text-green-500 tracking-tighter cursor-pointer" onClick={() => setTab('home')}>
                                <span>🐸</span> FROGLOGIC
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setTab('home')} className={`px-4 py-1.5 rounded-full text-sm font-bold transition ${tab === 'home' ? 'bg-green-500 text-gray-900' : 'text-gray-400 hover:text-white'}`}>Home</button>
                                <button onClick={() => setTab('games')} className={`px-4 py-1.5 rounded-full text-sm font-bold transition ${tab === 'games' ? 'bg-green-500 text-gray-900' : 'text-gray-400 hover:text-white'}`}>Games</button>
                            </div>
                        </div>
                    </nav>

                    {/* Main Content */}
                    <main className="flex-grow max-w-4xl mx-auto w-full p-6">
                        {tab === 'home' ? <Home /> : <Games />}
                    </main>

                    {/* Footer */}
                    <footer className="p-8 text-center text-gray-600 text-xs border-t border-gray-800">
                        <p>© {new Date().getFullYear()} FrogLogic Fan Page • Built for GitHub Pages</p>
                    </footer>
                </div>
            );
        }

        function Home() {
            return (
                <div className="py-12 animate-in fade-in duration-700">
                    <div className="text-center mb-12">
                        <div className="inline-block mb-6 p-4 bg-gray-800 rounded-3xl border-2 border-green-500 shadow-[0_0_20px_rgba(34,197,94,0.2)]">
                            <span className="text-7xl">🐸</span>
                        </div>
                        <h1 className="text-5xl font-black mb-4 tracking-tight bg-gradient-to-r from-green-400 to-emerald-500 bg-clip-text text-transparent">FrogLogic</h1>
                        <p className="text-gray-400 text-lg max-w-md mx-auto">Stay Logical. Stay Froggy. The official fan hub for gaming's most logical frog.</p>
                    </div>

                    <div className="grid gap-4 max-w-sm mx-auto">
                        <a href="https://youtube.com/@froglogicyt?si=pd_StrNtVRto6Jsm" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 bg-red-600 hover:bg-red-700 p-4 rounded-2xl font-black text-lg transition-all hover:scale-105 active:scale-95 shadow-lg">
                            📺 YouTube Channel
                        </a>
                        <a href="https://discord.gg/jYyyTj6Ak" target="_blank" rel="noopener noreferrer" className="flex items-center justify-center gap-3 bg-indigo-600 hover:bg-indigo-700 p-4 rounded-2xl font-black text-lg transition-all hover:scale-105 active:scale-95 shadow-lg">
                            💬 Join Discord
                        </a>
                    </div>
                </div>
            );
        }

        function Games() {
            const [gameType, setGameType] = useState('catch');

            return (
                <div className="py-8">
                    <div className="flex justify-center gap-4 mb-8">
                        <button onClick={() => setGameType('catch')} className={`px-4 py-2 rounded-xl font-bold transition ${gameType === 'catch' ? 'bg-green-500 text-gray-900 shadow-lg' : 'bg-gray-800 text-gray-500'}`}>60s Catch</button>
                        <button onClick={() => setGameType('tictactoe')} className={`px-4 py-2 rounded-xl font-bold transition ${gameType === 'tictactoe' ? 'bg-green-500 text-gray-900 shadow-lg' : 'bg-gray-800 text-gray-500'}`}>Tic Tac Toe</button>
                    </div>
                    
                    <div className="bg-gray-800/50 p-6 rounded-3xl border border-gray-700 max-w-md mx-auto min-h-[480px] flex flex-col justify-center shadow-2xl">
                        {gameType === 'catch' ? <CatchFrog /> : <TicTacToe />}
                    </div>
                </div>
            );
        }

        function CatchFrog() {
            const [score, setScore] = useState(0);
            const [pos, setPos] = useState(null);
            const [timeLeft, setTimeLeft] = useState(60);
            const [gameState, setGameState] = useState('idle'); 
            const timerRef = useRef(null);

            const startGame = () => {
                setScore(0);
                setTimeLeft(60);
                setGameState('playing');
                setPos(Math.floor(Math.random() * 9));
                
                if (timerRef.current) clearInterval(timerRef.current);
                
                timerRef.current = setInterval(() => {
                    setTimeLeft((prev) => {
                        if (prev <= 1) {
                            clearInterval(timerRef.current);
                            setGameState('finished');
                            setPos(null);
                            return 0;
                        }
                        return prev - 1;
                    });
                }, 1000);
            };

            // Cleanup interval on unmount
            useEffect(() => {
                return () => { if (timerRef.current) clearInterval(timerRef.current); };
            }, []);

            const handleTap = (i) => {
                if (gameState === 'playing' && i === pos) {
                    setScore(s => s + 1);
                    setPos(Math.floor(Math.random() * 9));
                }
            };

            if (gameState === 'idle') {
                return (
                    <div className="text-center py-10">
                        <h2 className="text-3xl font-black text-white mb-2">Catch The Frog</h2>
                        <p className="text-gray-400 mb-8 px-4">Test your logic and speed. How many frogs can you catch in 60 seconds?</p>
                        <button onClick={startGame} className="bg-green-500 text-gray-900 font-black text-xl px-12 py-4 rounded-2xl shadow-[0_0_20px_rgba(34,197,94,0.4)] hover:scale-105 active:scale-95 transition-all">
                            START GAME
                        </button>
                    </div>
                );
            }

            if (gameState === 'finished') {
                return (
                    <div className="text-center py-10">
                        <h2 className="text-4xl font-black text-green-500 mb-2">TIME'S UP!</h2>
                        <p className="text-gray-400 mb-2">Final Score</p>
                        <div className="text-8xl font-black text-white mb-8 tracking-tighter">{score}</div>
                        <button onClick={startGame} className="bg-gray-700 hover:bg-gray-600 text-white font-black text-lg px-10 py-3 rounded-2xl transition-all">
                            TRY AGAIN
                        </button>
                    </div>
                );
            }

            return (
                <div className="text-center">
                    <div className="flex justify-between items-center mb-6 px-2">
                        <div className="text-left">
                            <p className="text-[10px] text-gray-500 uppercase font-black tracking-widest">Time Remaining</p>
                            <p className={`text-3xl font-black tabular-nums ${timeLeft <= 10 ? 'text-red-500 animate-pulse' : 'text-white'}`}>{timeLeft}s</p>
                        </div>
                        <div className="text-right">
                            <p className="text-[10px] text-gray-500 uppercase font-black tracking-widest">Catch Count</p>
                            <p className="text-3xl font-black text-green-500 tabular-nums">{score}</p>
                        </div>
                    </div>
                    <div className="frog-grid">
                        {[...Array(9)].map((_, i) => (
                            <div key={i} onClick={() => handleTap(i)} className={`game-cell border border-gray-700 ${i === pos ? 'border-green-500/50' : ''}`}>
                                {i === pos && <span className="frog-emoji">🐸</span>}
                            </div>
                        ))}
                    </div>
                </div>
            );
        }

        function TicTacToe() {
            const [board, setBoard] = useState(Array(9).fill(null));
            const [xNext, setXNext] = useState(true);

            const calculateWinner = (sq) => {
                const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
                for (let [a,b,c] of lines) if (sq[a] && sq[a] === sq[b] && sq[a] === sq[c]) return sq[a];
                return null;
            };

            const winner = calculateWinner(board);
            const isDraw = !winner && board.every(val => val !== null);

            const handleClick = (i) => {
                if (winner || board[i]) return;
                const next = board.slice();
                next[i] = xNext ? '❌' : '⭕';
                setBoard(next);
                setXNext(!xNext);
            };

            return (
                <div className="text-center py-4">
                    <div className="mb-6 font-black text-xl text-white">
                        {winner ? (
                            <span className="text-green-400">Winner: {winner}</span>
                        ) : isDraw ? (
                            <span className="text-yellow-500">It's a Draw!</span>
                        ) : (
                            <span>Next: {xNext ? '❌' : '⭕'}</span>
                        )}
                    </div>
                    <div className="frog-grid">
                        {board.map((v, i) => (
                            <div key={i} onClick={() => handleClick(i)} className="game-cell text-2xl font-bold bg-gray-900 border border-gray-700">
                                {v}
                            </div>
                        ))}
                    </div>
                    <button onClick={() => { setBoard(Array(9).fill(null)); setXNext(true); }} className="mt-8 text-xs text-green-500 font-black uppercase tracking-widest border-b border-green-500 pb-1">Reset Board</button>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
